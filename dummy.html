<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Navbar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      background-color: #333;
      color: #fff;
    }
    .navbar .brand {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .navbar nav {
      display: flex;
      gap: 1rem;
    }
    .navbar a {
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
    }
    .navbar a:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="brand">NovaPay</div>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="home" style="padding: 2rem;">
      <h1>Welcome to NovaPay</h1>
      <p>This is a general navbar example for your page.</p>
    </section>
  </main>
</body>
</html>
